<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEATHER APP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="first">Weather App</h1>
  <div class="box">
    <header>
      <input type="search" name="" id="search"placeholder="Mangalore">
      <button type="submit"class="icon">🔎</button>
    </header>
    <main>
      <img src="download.png">
      <div class="middle">
        <h1>28.C</h1>
        <p>Scattered Clouds</p>
      </div>
    </main>
    <footer>
      <div class="humi">
        <p class="im">💧</p>
        <div>

          <p class="prec">51%</p>
          <p class="content">Humidity</p>
        </div>
      </div>
      <div class="humi">
        
        <p class="im">💨</p>
        <div>
          <p class="prec">4.63Km/H</p>
          <p  class="content">Wind speed</p>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
